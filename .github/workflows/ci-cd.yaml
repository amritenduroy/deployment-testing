name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          source venv/bin/activate
          pytest --cov=app --cov-report=term-missing -v

      - name: Cleanup venv
        if: always()
        run: rm -rf venv

  build-and-deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hello-world-api:latest .

      - name: Load image into Kubernetes node
        run: docker save hello-world-api:latest | docker exec -i desktop-control-plane ctr -n k8s.io images import -

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/hello-world-api
          kubectl rollout status deployment/hello-world-api --timeout=60s
